<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Restaurant Admin Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f5ef;
            color: #2f2f2f;
        }

        .page-header {
            background: #8b1014;
            color: white;
            padding: 22px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .admin-page {
            width: 92%;
            max-width: 1200px;
            margin: 35px auto;
        }

        .admin-page h1 {
            color: #8b1014;
            margin-bottom: 25px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .stat-card h3 {
            color: #777;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .stat-card strong {
            color: #8b1014;
            font-size: 30px;
        }

        .admin-section {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        .admin-section h2 {
            color: #8b1014;
            margin-bottom: 20px;
        }

        .admin-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .admin-link {
            text-decoration: none;
            background: #faf7f2;
            color: #2f2f2f;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            border: 1px solid #eeeeee;
        }

        .admin-link:hover {
            border-color: #d4af37;
        }

        .menu-table {
            width: 100%;
            border-collapse: collapse;
        }

        .menu-table th,
        .menu-table td {
            padding: 14px;
            border-bottom: 1px solid #eeeeee;
            text-align: left;
        }

        .menu-table th {
            background: #faf7f2;
            color: #8b1014;
        }

        .action-button {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .edit-button {
            background: #d4af37;
        }

        .delete-button {
            background: #c0392b;
            color: white;
        }

        @media (max-width: 700px) {
            .menu-table {
                font-size: 14px;
            }

            .menu-table th,
            .menu-table td {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="page-header">
        ⚙️ Green & Red Restaurant Admin
    </div>

    <main class="admin-page">

        <h1>Dashboard</h1>

        <section class="stats-grid">

            <div class="stat-card">
                <h3>Total Orders</h3>
                <strong id="totalOrders">0</strong>
            </div>

            <div class="stat-card">
                <h3>Total Revenue</h3>
                <strong>SAR <span id="totalRevenue">0</span></strong>
            </div>

            <div class="stat-card">
                <h3>Active Orders</h3>
                <strong id="activeOrders">0</strong>
            </div>

            <div class="stat-card">
                <h3>Menu Items</h3>
                <strong id="menuCount">0</strong>
            </div>

        </section>

        <section class="admin-section">

            <h2>Quick Access</h2>

            <div class="admin-links">

                <a class="admin-link" href="kitchen.html">
                    🍳 Kitchen Dashboard
                </a>

                <a class="admin-link" href="menu.html">
                    🍽️ Customer Menu
                </a>

                <a class="admin-link" href="#menuManagement">
                    📦 Manage Menu
                </a>

            </div>

        </section>

        <section id="menuManagement" class="admin-section">

            <h2>Menu Management</h2>

            <table class="menu-table">

                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="menuTableBody"></tbody>

            </table>

        </section>

    </main>

    <script>
        const defaultMenuItems = [
            {
                id: 1,
                name: "Chicken Biryani Full",
                category: "Traditional Dishes",
                price: 22
            },
            {
                id: 2,
                name: "Mutton Biryani Full",
                category: "Traditional Dishes",
                price: 25
            },
            {
                id: 3,
                name: "Chicken 65",
                category: "Starters",
                price: 20
            },
            {
                id: 4,
                name: "Fish Fry Boneless",
                category: "Starters",
                price: 25
            },
            {
                id: 5,
                name: "Chicken Fried Rice",
                category: "Fast Food",
                price: 17
            },
            {
                id: 6,
                name: "Chicken Handi",
                category: "Chicken Gravy",
                price: 19
            },
            {
                id: 7,
                name: "Mutton Handi",
                category: "Mutton Gravy",
                price: 20
            },
            {
                id: 8,
                name: "Paneer Butter Masala",
                category: "Vegetarian",
                price: 24
            }
        ];

        let menuItems =
            JSON.parse(localStorage.getItem("tableTapMenu")) ||
            defaultMenuItems;

        const orders =
            JSON.parse(localStorage.getItem("tableTapOrders")) || [];

        function loadStats() {
            const totalRevenue = orders.reduce(function (total, order) {
                return total + Number(order.total || 0);
            }, 0);

            const activeOrders = orders.filter(function (order) {
                return order.status !== "Completed";
            }).length;

            document.getElementById("totalOrders").textContent =
                orders.length;

            document.getElementById("totalRevenue").textContent =
                totalRevenue;

            document.getElementById("activeOrders").textContent =
                activeOrders;

            document.getElementById("menuCount").textContent =
                menuItems.length;
        }

        function renderMenuTable() {
            const tableBody =
                document.getElementById("menuTableBody");

            tableBody.innerHTML = "";

            menuItems.forEach(function (item) {
                const row = document.createElement("tr");

                row.innerHTML = `
                    <td>${item.name}</td>
                    <td>${item.category}</td>
                    <td>SAR ${item.price}</td>
                    <td>
                        <button
                            class="action-button edit-button"
                            onclick="editItem(${item.id})"
                        >
                            Edit
                        </button>

                        <button
                            class="action-button delete-button"
                            onclick="deleteItem(${item.id})"
                        >
                            Delete
                        </button>
                    </td>
                `;

                tableBody.appendChild(row);
            });
        }

        function editItem(itemId) {
            const item = menuItems.find(function (menuItem) {
                return menuItem.id === itemId;
            });

            if (!item) {
                return;
            }

            const newName =
                prompt("Enter item name:", item.name);

            const newPrice =
                prompt("Enter item price:", item.price);

            if (!newName || !newPrice) {
                return;
            }

            item.name = newName;
            item.price = Number(newPrice);

            saveMenu();
        }

        function deleteItem(itemId) {
            const confirmed =
                confirm("Are you sure you want to delete this item?");

            if (!confirmed) {
                return;
            }

            menuItems = menuItems.filter(function (item) {
                return item.id !== itemId;
            });

            saveMenu();
        }

        function saveMenu() {
            localStorage.setItem(
                "tableTapMenu",
                JSON.stringify(menuItems)
            );

            loadStats();
            renderMenuTable();
        }

        saveMenu();
    </script>

</body>
</html>
