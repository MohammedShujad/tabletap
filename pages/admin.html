<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Restaurant Admin Panel</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f5ef;
            color: #2f2f2f;
        }

        .page-header {
            background: #8b1014;
            color: white;
            padding: 22px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .admin-page {
            width: 92%;
            max-width: 1200px;
            margin: 35px auto;
        }

        .admin-page h1 {
            color: #8b1014;
            margin-bottom: 25px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 18px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 22px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .stat-card h3 {
            color: #777;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .stat-card strong {
            color: #8b1014;
            font-size: 30px;
        }

        .admin-section {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            margin-bottom: 25px;
        }

        .admin-section h2 {
            color: #8b1014;
            margin-bottom: 20px;
        }

        .admin-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .admin-link {
            text-decoration: none;
            background: #faf7f2;
            color: #2f2f2f;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            border: 1px solid #eeeeee;
        }

        .admin-link:hover {
            border-color: #d4af37;
        }

        .menu-table {
            width: 100%;
            border-collapse: collapse;
        }

        .menu-table th,
        .menu-table td {
            padding: 14px;
            border-bottom: 1px solid #eeeeee;
            text-align: left;
        }

        .menu-table th {
            background: #faf7f2;
            color: #8b1014;
        }

        .action-button {
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }

        .edit-button {
            background: #d4af37;
        }

        .delete-button {
            background: #c0392b;
            color: white;
        }

        @media (max-width: 700px) {
            .menu-table {
                font-size: 14px;
            }

            .menu-table th,
            .menu-table td {
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <div class="page-header">
        ⚙️ Green & Red Restaurant Admin
    </div>

    <main class="admin-page">

        <h1>Dashboard</h1>

        <section class="stats-grid">

            <div class="stat-card">
                <h3>Total Orders</h3>
                <strong id="totalOrders">0</strong>
            </div>

            <div class="stat-card">
                <h3>Total Revenue</h3>
                <strong>SAR <span id="totalRevenue">0</span></strong>
            </div>

            <div class="stat-card">
                <h3>Active Orders</h3>
                <strong id="activeOrders">0</strong>
            </div>

            <div class="stat-card">
                <h3>Menu Items</h3>
                <strong id="menuCount">0</strong>
            </div>

        </section>

        <section class="admin-section">

            <h2>Quick Access</h2>

            <div class="admin-links">

                <a class="admin-link" href="kitchen.html">
                    🍳 Kitchen Dashboard
                </a>

                <a class="admin-link" href="menu.html">
                    🍽️ Customer Menu
                </a>

                <a class="admin-link" href="#menuManagement">
                    📦 Manage Menu
                </a>

            </div>

        </section>

        <section id="menuManagement" class="admin-section">

            <h2>Menu Management</h2>
<button id="addMenuItemBtn" class="action-button edit-button" style="margin-bottom:20px;">
    + Add New Menu Item
</button>

<div id="addItemForm" style="display:none; margin-bottom:20px;">

    <input id="foodName" placeholder="Food Name"
        style="width:100%;padding:12px;margin-bottom:10px;">
        

    <select
    id="foodCategory"
    style="width:100%;padding:12px;margin-bottom:10px;"
>
    <option value="">Select Category</option>
</select>

<input
    id="newCategory"
    placeholder="Or create a new category"
    style="width:100%;padding:12px;margin-bottom:10px;"
>

    <input
    id="foodPrice"
    type="number"
    placeholder="Price"
    style="width:100%;padding:12px;margin-bottom:10px;"
>

<input
    id="foodImage"
    type="url"
    placeholder="Food Image URL"
    style="width:100%;padding:12px;margin-bottom:10px;"
>

<button
    id="saveNewItem"
    class="action-button edit-button"
>
    Save Item
</button>

</div>
            <table class="menu-table">

                <thead>
                    <tr>
    <th>Name</th>
    <th>Category</th>
    <th>Price</th>
    <th>Status</th>
    <th>Actions</th>
                 </tr>
                </thead>

                <tbody id="menuTableBody"></tbody>

            </table>

        </section>

    </main>

    <script>
    const defaultMenuItems = [
        {
            id: 1,
            name: "Chicken Biryani Full",
            category: "Traditional Dishes",
            price: 22,
            image: ""
        },
        {
            id: 2,
            name: "Mutton Biryani Full",
            category: "Traditional Dishes",
            price: 25,
            image: ""
        },
        {
            id: 3,
            name: "Chicken 65",
            category: "Starters",
            price: 20,
            image: ""
        },
        {
            id: 4,
            name: "Fish Fry Boneless",
            category: "Starters",
            price: 25,
            image: ""
        },
        {
            id: 5,
            name: "Chicken Fried Rice",
            category: "Fast Food",
            price: 17,
            image: ""
        },
        {
            id: 6,
            name: "Chicken Handi",
            category: "Chicken Gravy",
            price: 19,
            image: ""
        },
        {
            id: 7,
            name: "Mutton Handi",
            category: "Mutton Gravy",
            price: 20,
            image: ""
        },
        {
            id: 8,
            name: "Paneer Butter Masala",
            category: "Vegetarian",
            price: 24,
            image: ""
        }
    ];

    let menuItems =
    JSON.parse(localStorage.getItem("tableTapMenu")) ||
    defaultMenuItems;

menuItems = menuItems.map(function (item) {
    return {
        ...item,
        available: item.available !== false
    };
});

    const orders =
        JSON.parse(localStorage.getItem("tableTapOrders")) || [];

    const addMenuItemBtn =
        document.getElementById("addMenuItemBtn");

    const addItemForm =
        document.getElementById("addItemForm");

    const saveNewItem =
        document.getElementById("saveNewItem");

    const foodCategory =
        document.getElementById("foodCategory");

    const newCategory =
        document.getElementById("newCategory");

    function cleanCategory(value) {
        return String(value || "")
            .trim()
            .replace(/\s+/g, " ");
    }

    function categoryKey(value) {
        return cleanCategory(value).toLowerCase();
    }

    function getCategories() {
        const categoryMap = new Map();

        menuItems.forEach(function (item) {
            const category = cleanCategory(item.category);
            const key = categoryKey(category);

            if (category && !categoryMap.has(key)) {
                categoryMap.set(key, category);
            }
        });

        return Array.from(categoryMap.values());
    }

    function loadCategoryOptions() {
        foodCategory.innerHTML =
            `<option value="">Select Category</option>`;

        getCategories().forEach(function (category) {
            const option = document.createElement("option");

            option.value = category;
            option.textContent = category;

            foodCategory.appendChild(option);
        });
    }

    function loadStats() {
        const totalRevenue = orders.reduce(function (total, order) {
            return total + Number(order.total || 0);
        }, 0);

        const activeOrders = orders.filter(function (order) {
            return order.status !== "Completed";
        }).length;

        document.getElementById("totalOrders").textContent =
            orders.length;

        document.getElementById("totalRevenue").textContent =
            totalRevenue;

        document.getElementById("activeOrders").textContent =
            activeOrders;

        document.getElementById("menuCount").textContent =
            menuItems.length;
    }

    function renderMenuTable() {
        const tableBody =
            document.getElementById("menuTableBody");

        tableBody.innerHTML = "";

        menuItems.forEach(function (item) {
            const row = document.createElement("tr");

            row.innerHTML = `
    <td>
        ${
            item.image
                ? `<img src="${item.image}"
                      alt="${item.name}"
                      style="width:60px;height:45px;
                      object-fit:cover;border-radius:8px;
                      margin-right:10px;vertical-align:middle;">`
                : ""
        }

        ${item.name}
    </td>

    <td>${item.category}</td>

    <td>SAR ${item.price}</td>

    <td>
        ${
            item.available
                ? `<strong style="color:#238636;">Available</strong>`
                : `<strong style="color:#c0392b;">Out of Stock</strong>`
        }
    </td>

    <td>
        <button
            class="action-button edit-button"
            onclick="editItem(${item.id})"
        >
            Edit
        </button>

        <button
            class="action-button"
            style="
                background:${item.available ? "#f0a500" : "#2e9d56"};
                color:white;
            "
            onclick="toggleAvailability(${item.id})"
        >
            ${item.available ? "Disable" : "Enable"}
        </button>

        <button
            class="action-button delete-button"
            onclick="deleteItem(${item.id})"
        >
            Delete
        </button>
    </td>
`;

            tableBody.appendChild(row);
        });
    }

    function editItem(itemId) {
        const item = menuItems.find(function (menuItem) {
            return String(menuItem.id) === String(itemId);
        });

        if (!item) {
            return;
        }

        const newName =
            prompt("Enter item name:", item.name);

        const newPrice =
            prompt("Enter item price:", item.price);

        const newImage =
            prompt("Enter image URL:", item.image || "");

        if (!newName || !newPrice) {
            return;
        }

        item.name = newName.trim();
        item.price = Number(newPrice);
        item.image = newImage ? newImage.trim() : "";

        saveMenu();
    }
function toggleAvailability(itemId) {
    const item = menuItems.find(function (menuItem) {
        return String(menuItem.id) === String(itemId);
    });

    if (!item) {
        return;
    }

    item.available = !item.available;

    saveMenu();
}
    function deleteItem(itemId) {
        const confirmed =
            confirm("Are you sure you want to delete this item?");

        if (!confirmed) {
            return;
        }

        menuItems = menuItems.filter(function (item) {
            return String(item.id) !== String(itemId);
        });

        saveMenu();
    }

    function saveMenu() {
        localStorage.setItem(
            "tableTapMenu",
            JSON.stringify(menuItems)
        );

        loadStats();
        renderMenuTable();
        loadCategoryOptions();
    }

    addMenuItemBtn.addEventListener("click", function () {
        const isHidden =
            addItemForm.style.display === "none";

        addItemForm.style.display =
            isHidden ? "block" : "none";

        addMenuItemBtn.textContent =
            isHidden
                ? "Close Form"
                : "+ Add New Menu Item";
    });

    saveNewItem.addEventListener("click", function () {
        const name =
            document.getElementById("foodName").value.trim();

        const selectedCategory =
            cleanCategory(foodCategory.value);

        const typedCategory =
            cleanCategory(newCategory.value);

        const price =
            Number(document.getElementById("foodPrice").value);

        const image =
            document.getElementById("foodImage").value.trim();

        if (!name || price <= 0) {
            alert("Please enter a valid food name and price.");
            return;
        }

        if (!selectedCategory && !typedCategory) {
            alert("Please select or create a category.");
            return;
        }

        const existingCategory =
            getCategories().find(function (category) {
                return (
                    categoryKey(category) ===
                    categoryKey(typedCategory)
                );
            });

        const finalCategory =
            typedCategory
                ? existingCategory || typedCategory
                : selectedCategory;

        const newItem = {
    id: Date.now(),
    name: name,
    category: finalCategory,
    price: price,
    image: image,
    available: true
};

        menuItems.push(newItem);

        document.getElementById("foodName").value = "";
        document.getElementById("foodPrice").value = "";
        document.getElementById("foodImage").value = "";
        foodCategory.value = "";
        newCategory.value = "";

        addItemForm.style.display = "none";
        addMenuItemBtn.textContent =
            "+ Add New Menu Item";

        saveMenu();

        alert("Menu item added successfully.");
    });

    loadCategoryOptions();
    saveMenu();
</script>
</body>
</html>
