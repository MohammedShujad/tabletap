<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Customer Details</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f8f5ef;
            color: #2f2f2f;
        }

        .page-header {
            background: #8b1014;
            color: white;
            padding: 22px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        .customer-page {
            width: 90%;
            max-width: 650px;
            margin: 50px auto;
            background: white;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .customer-page h1 {
            text-align: center;
            color: #8b1014;
            margin-bottom: 28px;
        }

        #customerForm {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        #customerForm input,
        #customerForm textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
        }

        #customerForm textarea {
            min-height: 120px;
            resize: vertical;
        }

        #customerForm button {
            background: #8b1014;
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }

        #customerForm button:hover {
            background: #6f0c10;
        }
    </style>
</head>

<body>

  <div class="page-header">
    🍽️ <span id="customerRestaurantName">Green & Red Restaurant</span>
</div>
    <div class="customer-page">

        <h1>Customer Details</h1>

        <form id="customerForm">

            <input
                type="text"
                id="customerName"
                placeholder="Full Name"
                required
            >

            <input
                type="tel"
                id="customerPhone"
                placeholder="Phone Number"
                required
            >

            <input
                type="text"
                id="tableNumber"
                placeholder="Table Number"
                required
            >

            <textarea
                id="specialRequest"
                placeholder="Special Instructions (Optional)"
            ></textarea>

            <button type="submit">
                Continue
            </button>

        </form>

    </div>

    <script>
    const savedSettings =
        JSON.parse(localStorage.getItem("tableTapSettings")) || {};

    const savedRestaurantName =
        savedSettings.restaurantName || "Green & Red Restaurant";

    document.getElementById("customerRestaurantName").textContent =
        savedRestaurantName;

    document.title =
        savedRestaurantName + " - Customer Details";

    document
        .getElementById("customerForm")
        .addEventListener("submit", function (event) {
            event.preventDefault();

            const customerDetails = {
                name: document.getElementById("customerName").value.trim(),
                phone: document.getElementById("customerPhone").value.trim(),
                table: document.getElementById("tableNumber").value.trim(),
                request: document.getElementById("specialRequest").value.trim()
            };

            localStorage.setItem(
                "tableTapCustomer",
                JSON.stringify(customerDetails)
            );

            window.location.href = "summary.html";
        });
</script>

</body>
</html>
