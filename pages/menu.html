<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Green & Red Menu</title>

    <link rel="stylesheet" href="../css/menu.css">
</head>

<body>

    <header class="header">
        <div class="logo">
            🍽️ Green & Red Restaurant
        </div>
        
    </header>
<div class="cart-bar">
    🛒 Cart: <span id="cartCount">0</span>
</div>

    <main class="menu-page">

        <section class="menu-heading">
            <h1>Our Menu</h1>

            <p>
                Select your favourite dishes and add them to your order.
            </p>
        </section>

        <section class="category-list">
            <button class="active">All</button>
            <button>Traditional Dishes</button>
            <button>Starters</button>
            <button>Fast Food</button>
            <button>Mutton Gravy</button>
            <button>Chicken Gravy</button>
            <button>Vegetarian</button>
        </section>

        <section id="menuContainer" class="menu-container">
        </section>

    </main>

    <script src="../js/menu.js"></script>

</body>
</html>
