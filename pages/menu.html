<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Green & Red Menu</title>

    <link rel="stylesheet" href="../css/menu.css">
</head>

<body>

    <header class="header">
        <div id="restaurantLogo" class="logo">
            🍽️
            <span id="restaurantName">
                Green & Red Restaurant
            </span>
        </div>
    </header>

    <main class="menu-page">

        <section class="menu-heading">
            <h1>Our Menu</h1>

            <p>
                Select your favourite dishes and add them to your order.
            </p>
        </section>

        <section
            id="categoryList"
            class="category-list"
        ></section>

        <section
            id="menuContainer"
            class="menu-container"
        ></section>

    </main>

    <button
        id="openCart"
        class="cart-bar"
        type="button"
    >
        🛒 Cart:
        <span id="cartCount">0</span>
    </button>

    <div
        id="cartOverlay"
        class="cart-overlay"
    ></div>

    <aside
        id="cartPanel"
        class="cart-panel"
    >

        <div class="cart-panel-header">
            <h2>Your Cart</h2>

            <button
                id="closeCart"
                class="close-cart"
                type="button"
            >
                ×
            </button>
        </div>

        <div
            id="cartItems"
            class="cart-items"
        >
            <p class="empty-cart">
                Your cart is empty.
            </p>
        </div>

        <div class="cart-total">
            Total:
            <span id="cartCurrency">SAR</span>
            <span id="cartTotal">0</span>
        </div>

        <button
            class="checkout-button"
            type="button"
            onclick="window.location.href='customer.html'"
        >
            Continue
        </button>

    </aside>

    <script src="../js/menu.js"></script>

</body>
</html>
